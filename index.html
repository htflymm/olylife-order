*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  /* Noto Sans TC: clean, modern, matches OlyLife official site */
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text);
}

@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.28s ease; }

input, textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  padding: 11px 14px;
  background: var(--white);
  color: var(--text);
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, textarea:focus {
  border-color: var(--green-light);
  box-shadow: 0 0 0 3px var(--green-glow);
}
input::placeholder, textarea::placeholder { color: var(--text-mute); }
textarea { resize: none; }

label {
  display: block;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  margin-bottom: 6px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── Product cards ── */
.product-card {
  transition: all 0.15s ease;
  cursor: pointer;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  background: var(--white);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.product-card:hover { border-color: var(--green-light); box-shadow: 0 4px 16px rgba(42,138,62,0.12); transform: translateY(-1px); }
.product-card.has-qty {
  border-color: var(--green) !important;
  background: var(--green-bg) !important;
  box-shadow: 0 4px 18px rgba(42,138,62,0.18) !important;
}
.product-card.has-qty .prod-name  { color: var(--green) !important; }
.product-card.has-qty .prod-price { color: var(--green-light) !important; }

.prod-img-wrap {
  width: 100%; aspect-ratio: 1/1;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; border-bottom: 1px solid var(--border);
}
.prod-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
.prod-img-placeholder {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem; font-weight: 700;
  color: var(--green-dim);
}

.qty-btn {
  width: 28px; height: 28px; border-radius: 4px; border: none;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: all 0.12s; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.qty-btn:active { transform: scale(0.88); }

.pos-section { border-left: 3px solid var(--green-dim); padding-left: 16px; margin-bottom: 28px; }

.step-btn { transition: all 0.18s; font-family: 'Noto Sans TC', sans-serif; }
.step-btn:hover:not(:disabled) { transform: translateY(-1px); }

/* LINE output: dark background mimics LINE message bubble */
.line-output {
  font-family: monospace;
  background: #1a2f1c;
  color: #c8e6cb;
  border-radius: 6px;
  border: 1px solid var(--border);
  padding: 18px;
  white-space: pre-wrap;
  font-size: 13px;
  line-height: 1.9;
  max-height: 420px;
  overflow-y: auto;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

// Parse personal info fields from old order text
const parseOldOrder = (text) => {
  const extract = (pattern) => {
    const m = text.match(pattern);
    return m ? m[1].trim() : "";
  };
  const parsed = {
    name:       extract(/▶️中文姓名：(.+)/),
    idNumber:   extract(/▶️身分證字號：(.+)/),
    email:      extract(/▶️電子郵箱：(.+)/),
    phone:      extract(/▶️手機號碼：(.+)/),
    postalCode: extract(/▶️郵遞區號：(.+)/),
    address:    extract(/▶️地址：(.+)/),
  };
  // Only update fields that were successfully parsed
  if (Object.values(parsed).some(v => v)) {
    setForm(f => ({...f, ...Object.fromEntries(
      Object.entries(parsed).filter(([,v]) => v)
    )}));
  }
};

const set = (k, v) => setForm(f => ({...f, [k]: v}));

// Toggle quantity for a product in a position
const changeQty = (pos, id, delta) => setForm(f => {
  const cur = f.positions[pos][id] || 0;
  const next = Math.max(0, cur + delta);
  const updated = {...f.positions[pos]};
  if (next === 0) delete updated[id]; else updated[id] = next;
  return {...f, positions: {...f.positions, [pos]: updated}};
});

// Sum total price for one position
const posTotal = (pk) => Object.entries(form.positions[pk]).reduce((s, [id, qty]) => {
  const p = PRODUCTS.find(pr => pr.id === id);
  return s + (p ? p.price * qty : 0);
}, 0);

  out += "▶️有無申請EZway：" + (form.ezway || "未填") + "\n";

  if (form.payMethod === "transfer") out += "\n▶️備註：\n匯款帳號末五碼：\n";
  out += "\n以下客戶免填\n▶️推薦人+編號：\n▶️安置人+編號：";
  return out;
};

const canNext = () => {
  if (step === 0) return posOk();
  if (step === 1) return form.name && form.idNumber && form.email && form.phone && form.address;
  if (step === 2) return form.payMethod === "transfer"
    || (form.cardNumber && form.cardName && form.cardExpiry && form.cardCVV);
  if (step === 3) return form.sameAsPersonal
    || (form.shipName && form.shipId && form.shipPhone && form.shipAddress);
  return true;
};
