<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>奇跡入單 | OlyLife</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:         #f5faf6;
      --white:      #ffffff;
      --surface:    #ffffff;
      --surface2:   #f0f7f1;
      --border:     #d4e8d6;
      --border2:    #b8d9bb;
      --green:      #2a8a3e;
      --green-light:#35a84e;
      --green-dim:  #c8e6cb;
      --green-bg:   rgba(42,138,62,0.07);
      --green-glow: rgba(42,138,62,0.18);
      --green-hero: #25a244;
      --logo-bg:    #d6edd8;
      --text:       #0f1f12;
      --text-dim:   #3d6644;
      --text-mute:  #7ea882;
      --red:        #c62828;
      --red-bg:     rgba(198,40,40,0.07);
      --blue-ref:   #1565c0;
      --blue-bg:    rgba(21,101,192,0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.28s ease; }

    input, textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 11px 14px;
      background: var(--white);
      color: var(--text);
      font-size: 14px;
      font-family: 'Noto Serif TC', serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px var(--green-glow);
    }
    input::placeholder, textarea::placeholder { color: var(--text-mute); }
    textarea { resize: none; }

    label {
      display: block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 6px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    /* ── Product cards ── */
    .product-card {
      transition: all 0.15s ease;
      cursor: pointer;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover { border-color: var(--green-light); box-shadow: 0 4px 16px rgba(42,138,62,0.13); transform: translateY(-1px); }
    .product-card.has-qty {
      border-color: var(--green) !important;
      background: var(--green-bg) !important;
      box-shadow: 0 4px 18px rgba(42,138,62,0.18) !important;
    }
    .product-card.has-qty .prod-name  { color: var(--green) !important; }
    .product-card.has-qty .prod-price { color: var(--green-light) !important; }

    .prod-img-wrap {
      width: 100%; aspect-ratio: 1/1;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border-bottom: 1.5px solid var(--border);
    }
    .prod-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .prod-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem; font-weight: 700;
      color: var(--green-dim);
    }

    /* ── Qty buttons ── */
    .qty-btn {
      width: 28px; height: 28px; border-radius: 4px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.12s; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .qty-btn:active { transform: scale(0.88); }

    /* ── Position section ── */
    .pos-section { border-left: 3px solid var(--green-dim); padding-left: 16px; margin-bottom: 26px; }

    /* ── Step buttons ── */
    .step-btn { transition: all 0.18s; font-family: 'Noto Serif TC', serif; }
    .step-btn:hover:not(:disabled) { transform: translateY(-1px); }

    /* ── LINE output ── */
    .line-output {
      font-family: monospace;
      background: #0f1f12;
      color: #c8e6cb;
      border-radius: 6px;
      border: 1px solid var(--border);
      padding: 18px;
      white-space: pre-wrap;
      font-size: 12.5px;
      line-height: 1.8;
      max-height: 380px;
      overflow-y: auto;
    }

    /* ── Home cards ── */
    .home-card {
      cursor: pointer;
      border-radius: 10px;
      padding: 22px 20px;
      border: 1.5px solid var(--border);
      background: var(--white);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .home-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--green), var(--green-light), #66bb6a);
      opacity: 0; transition: opacity 0.2s;
    }
    .home-card:hover { border-color: var(--green-light); box-shadow: 0 6px 24px rgba(42,138,62,0.13); transform: translateY(-2px); }
    .home-card:hover::after { opacity: 1; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--surface2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  const LOGO = "https://olylife.com/Main/assets/company/logo.png";
  const BASE = "https://olylife.com/Main/assets/product/";
  const ADM  = "https://admin.olylifeint.com/Res/img/product/";
  const GLB  = "https://olylifeglobal.com/wp-content/uploads/";

  const PRODUCTS = [
    { id:"p90",      name:"P90",               price:1000, img: BASE+"OLY-HCA002.png" },
    { id:"p90plus",  name:"P90 Plus",           price:2000, img: ADM+"OLY-HCA002A.png" },
    { id:"shaken",   name:"甩脂儀 Shaken",      price:1000, img: GLB+"2025/11/olylife_shaken_massager.png" },
    { id:"g1",       name:"護眼儀 G1",           price:500,  img: BASE+"OLY-PKG004.png", note:"兩組，送葉黃素" },
    { id:"hydro",    name:"氫霸杯",              price:600,  img: ADM+"OLY-TPC002.png" },
    { id:"a9",       name:"A9 空氣淨化儀",       price:600,  img: ADM+"OLY-HCA005.png" },
    { id:"slyline",  name:"雲感衛生棉 SlyLine",  price:500,  img: GLB+"2025/09/olylife-skyline-sl-6.jpg" },
    { id:"miniblow", name:"小神吹",              price:600,  img: GLB+"2024/07/Vitality-Wand-copy-1-300x300.jpg" },
  ];

  const POSITIONS = [
    { key:"main",  label:"主球", icon:"▲", desc:"主要入單位置" },
    { key:"left",  label:"左球", icon:"◣", desc:"主球左側下線" },
    { key:"right", label:"右球", icon:"◢", desc:"主球右側下線" },
  ];
  const MIN = 1000;

  /* ── ProdImage ── */
  function ProdImage({src, name}) {
    const [failed, setFailed] = useState(false);
    if (!src || failed) {
      return (
        <div className="prod-img-wrap">
          <div className="prod-img-placeholder">{name.slice(0,2)}</div>
        </div>
      );
    }
    return (
      <div className="prod-img-wrap">
        <img src={src} alt={name} onError={() => setFailed(true)} />
      </div>
    );
  }

  /* ── Shared UI ── */
  const Card = ({children}) => (
    <div style={{
      maxWidth:520, margin:"0 auto",
      background:"#ffffff",
      borderRadius:10,
      boxShadow:"0 2px 20px rgba(0,80,20,0.09)",
      padding:"28px 24px",
      border:"1.5px solid #d4e8d6",
    }}>{children}</div>
  );

  const PrimaryBtn = ({onClick, disabled, children, altColor}) => (
    <button onClick={onClick} disabled={disabled} className="step-btn" style={{
      flex:2, padding:"14px", borderRadius:6, border:"none",
      background: disabled ? "#e8f5e9"
        : altColor ? "linear-gradient(135deg,#1565c0,#1976d2)"
        : "linear-gradient(135deg,#1e7a35,#25a244)",
      color: disabled ? "#7ea882" : "#ffffff",
      fontWeight:700, fontSize:"0.92rem",
      cursor: disabled ? "not-allowed" : "pointer",
      boxShadow: disabled ? "none" : (altColor ? "0 4px 14px rgba(21,101,192,0.28)" : "0 4px 14px rgba(37,162,68,0.32)"),
      fontFamily:"'Noto Serif TC',serif", transition:"all 0.2s", letterSpacing:"0.03em",
    }}>{children}</button>
  );

  const SecondaryBtn = ({onClick, children}) => (
    <button onClick={onClick} className="step-btn" style={{
      flex:1, padding:"14px", borderRadius:6,
      border:"1.5px solid #d4e8d6", background:"#ffffff",
      color:"#3d6644", fontWeight:600, fontSize:"0.88rem", cursor:"pointer",
      fontFamily:"'Noto Serif TC',serif",
    }}>{children}</button>
  );

  const CopyBtn = ({getText}) => {
    const [copied, setCopied] = useState(false);
    return (
      <button onClick={() => { navigator.clipboard.writeText(getText()).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }); }} style={{
        width:"100%", marginTop:16, padding:"14px", borderRadius:6, border:"none",
        background: copied ? "linear-gradient(135deg,#1565c0,#1976d2)" : "linear-gradient(135deg,#1e7a35,#25a244)",
        color:"#ffffff", fontWeight:700, fontSize:"0.95rem", cursor:"pointer",
        boxShadow: copied ? "0 4px 14px rgba(21,101,192,0.28)" : "0 4px 14px rgba(37,162,68,0.32)",
        transition:"all 0.3s", fontFamily:"'Noto Serif TC',serif", letterSpacing:"0.03em",
      }}>
        {copied ? "已複製！貼到 LINE 吧" : "一鍵複製 LINE 格式"}
      </button>
    );
  };

  const ResetBtn = ({onClick}) => (
    <button onClick={onClick} style={{
      width:"100%", marginTop:10, padding:"12px", borderRadius:6,
      border:"1.5px solid #d4e8d6", background:"transparent",
      color:"#7ea882", fontWeight:600, fontSize:"0.88rem", cursor:"pointer",
      fontFamily:"'Noto Serif TC',serif",
    }}>↺ 重新操作</button>
  );

  const StepBar = ({steps, current}) => (
    <div style={{maxWidth:520, margin:"0 auto 24px"}}>
      <div style={{display:"flex", alignItems:"center", marginBottom:8}}>
        {steps.map((s, i) => (
          <React.Fragment key={i}>
            <div style={{
              width:30, height:30, borderRadius:15, flexShrink:0,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontFamily:"'Rajdhani',sans-serif", fontSize:"0.75rem", fontWeight:700,
              background: i < current ? "#2a8a3e" : (i === current ? "#25a244" : "#d4e8d6"),
              color: i <= current ? "#ffffff" : "#7ea882",
              boxShadow: i === current ? "0 0 0 4px rgba(37,162,68,0.22)" : "none",
              transition:"all 0.3s",
            }}>{i < current ? "✓" : i + 1}</div>
            {i < steps.length - 1 && (
              <div style={{flex:1, height:2, margin:"0 4px", background: i < current ? "#2a8a3e" : "#d4e8d6", transition:"background 0.3s"}} />
            )}
          </React.Fragment>
        ))}
      </div>
      <div style={{textAlign:"center"}}>
        <span style={{fontFamily:"'Rajdhani',sans-serif", color:"#2a8a3e", fontWeight:700, fontSize:"0.85rem", letterSpacing:"0.1em", textTransform:"uppercase"}}>{steps[current]}</span>
      </div>
    </div>
  );

  const InfoBox = ({color, children}) => {
    const C = {
      green: {bg:"rgba(42,138,62,0.07)",  border:"rgba(42,138,62,0.22)",  text:"#1e7a35"},
      red:   {bg:"rgba(198,40,40,0.07)",  border:"rgba(198,40,40,0.22)",  text:"#c62828"},
      blue:  {bg:"rgba(21,101,192,0.07)", border:"rgba(21,101,192,0.22)", text:"#1565c0"},
    };
    const c = C[color] || C.green;
    return (
      <div style={{padding:"12px 16px", borderRadius:6, marginBottom:16, background:c.bg, border:"1px solid "+c.border, fontSize:"0.82rem", color:c.text, lineHeight:1.7}}>
        {children}
      </div>
    );
  };

  /* ══════════════════════════════════════════
     MODE 1 — 新訂單
  ══════════════════════════════════════════ */
  const emptyNew = {
    positions: {main:{}, left:{}, right:{}},
    name:"", idNumber:"", email:"", phone:"", postalCode:"", address:"",
    payMethod:"transfer", cardNumber:"", cardName:"", cardExpiry:"", cardCVV:"",
    sameAsPersonal:true, shipName:"", shipId:"", shipPhone:"", shipAddress:"",
    ezway:"", remarks:"",
  };

  function NewOrder({onBack}) {
    const [step, setStep] = useState(0);
    const [form, setForm] = useState(emptyNew);
    const [transferTo, setTransferTo] = useState("");

    const set = (k, v) => setForm(f => ({...f, [k]: v}));

    const changeQty = (pos, id, delta) => setForm(f => {
      const cur = f.positions[pos][id] || 0;
      const next = Math.max(0, cur + delta);
      const updated = {...f.positions[pos]};
      if (next === 0) delete updated[id]; else updated[id] = next;
      return {...f, positions: {...f.positions, [pos]: updated}};
    });

    const posTotal = (pk) => Object.entries(form.positions[pk]).reduce((s, [id, qty]) => {
      const p = PRODUCTS.find(pr => pr.id === id);
      return s + (p ? p.price * qty : 0);
    }, 0);

    const total = POSITIONS.reduce((s, p) => s + posTotal(p.key), 0);

    const posOk = () =>
      Object.keys(form.positions.main).length > 0 &&
      POSITIONS.every(p => Object.keys(form.positions[p.key]).length === 0 || posTotal(p.key) >= MIN);

    const generateLine = () => {
      const posLine = POSITIONS.map(p => {
        const entries = Object.entries(form.positions[p.key]);
        if (!entries.length) return p.label + "：（未選擇）";
        const items = entries.map(([id, qty]) => {
          const pr = PRODUCTS.find(r => r.id === id);
          return qty > 1 ? (pr.name + " x" + qty + "（$" + (pr.price * qty) + "）") : (pr.name + "（$" + pr.price + "）");
        }).join("、");
        return p.label + "：" + items + "\n　　　　小計 $" + posTotal(p.key).toLocaleString();
      }).join("\n");

      let paySection;
      if (form.payMethod === "transfer") {
        paySection = "▶️匯款信息\n中國信託(822) 台中南屯分行 \n匯款帳號：045540435682 \n戶名：鄒震宇\n（備註欄空白，方便對帳）\n----------------------";
        if (transferTo) paySection += "\n匯款給：" + transferTo;
      } else {
        paySection = "▶️刷卡 \n(一台刷美金1000\n匯率和手續費視銀行而定\n若少刷外幣，請先照會銀行\n以免被拒！)\n\n信用卡號：" + form.cardNumber + "\n\n信用卡英文名字：" + form.cardName + "\n\n信用卡有效期（mm/yy）：" + form.cardExpiry + "\n\n安全碼(卡背面的三位數字)：" + form.cardCVV;
      }

      const sn = form.sameAsPersonal ? form.name    : form.shipName;
      const si = form.sameAsPersonal ? form.idNumber : form.shipId;
      const sp = form.sameAsPersonal ? form.phone    : form.shipPhone;
      const sa = form.sameAsPersonal ? form.address  : form.shipAddress;

      let out = "會員註冊資料(版本更新)\n🌟Olylife 註冊資料\n\n";
      out += "▶️中文姓名：" + form.name + "\n";
      out += "▶️身分證字號：" + form.idNumber + "\n";
      out += "▶️電子郵箱：" + form.email + "\n";
      out += "▶️手機號碼：" + form.phone + "\n";
      out += "▶️郵遞區號：" + form.postalCode + "\n";
      out += "▶️地址：" + form.address + "\n\n";
      out += "▶️產品選擇（合計 $" + total.toLocaleString() + "）\n" + posLine + "\n\n";
      out += paySection + "\n\n";
      out += "▶️收貨信息\n 姓名：" + sn + "\n 身分證號：" + si + "\n 電話：" + sp + "\n 地址：" + sa + "\n\n";
      out += "▶️有無申請EZway：" + (form.ezway || "未填") + "\n(申請EZway資料，務必和上面\n收貨信息相同！）\n";
      if (form.remarks) out += "\n▶️備註：" + form.remarks + "\n";
      if (form.payMethod === "transfer") out += "\n▶️備註：\n匯款帳號末五碼：\n";
      out += "\n以下客戶免填\n▶️推薦人+編號：\n▶️安置人+編號：";
      return out;
    };

    const canNext = () => {
      if (step === 0) return posOk();
      if (step === 1) return form.name && form.idNumber && form.email && form.phone && form.address;
      if (step === 2) return form.payMethod === "transfer" || (form.cardNumber && form.cardName && form.cardExpiry && form.cardCVV);
      if (step === 3) return form.sameAsPersonal || (form.shipName && form.shipId && form.shipPhone && form.shipAddress);
      return true;
    };

    const tabStyle = (active) => ({
      flex:1, padding:"13px", borderRadius:6, fontWeight:600, fontSize:"0.88rem",
      border: active ? "1.5px solid #25a244" : "1.5px solid #d4e8d6",
      background: active ? "rgba(42,138,62,0.08)" : "#ffffff",
      color: active ? "#2a8a3e" : "#7ea882",
      cursor:"pointer", transition:"all 0.2s", fontFamily:"'Noto Serif TC',serif",
      boxShadow: active ? "0 2px 8px rgba(42,138,62,0.15)" : "none",
    });

    const ezwayStyle = (active) => ({
      flex:1, padding:"10px", borderRadius:6, fontSize:"0.85rem", fontWeight:600,
      border: "1.5px solid " + (active ? "#25a244" : "#d4e8d6"),
      background: active ? "rgba(42,138,62,0.08)" : "#ffffff",
      color: active ? "#2a8a3e" : "#7ea882",
      cursor:"pointer", transition:"all 0.2s", fontFamily:"'Noto Serif TC',serif",
    });

    return (
      <div className="fade-in">
        <StepBar steps={["產品選擇","個人資料","付款方式","收貨資訊","確認訂單"]} current={step} />
        <Card>

          {/* Step 0 — Products */}
          {step === 0 && (
            <div>
              <p style={{color:"#3d6644", fontSize:"0.82rem", marginBottom:20, lineHeight:1.7}}>
                每個位置可選多項產品，金額自動加總。主球必填，左右球可視情況選填。
                <strong style={{color:"#2a8a3e"}}> 每個球位最低 $1,000。</strong>
              </p>
              {POSITIONS.map(pos => {
                const sub = posTotal(pos.key);
                const hasSel = Object.keys(form.positions[pos.key]).length > 0;
                const low = hasSel && sub < MIN;
                return (
                  <div key={pos.key} className="pos-section" style={{borderLeftColor: low ? "#c62828" : "#25a244"}}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
                      <div>
                        <span style={{fontFamily:"'Rajdhani',sans-serif", fontSize:"0.95rem", fontWeight:700, color:"#0f1f12", letterSpacing:"0.04em"}}>{pos.icon} {pos.label}</span>
                        <span style={{fontSize:"0.72rem", color:"#7ea882", marginLeft:8}}>{pos.desc}</span>
                      </div>
                      {hasSel && (
                        <div style={{
                          fontFamily:"'Rajdhani',sans-serif",
                          fontSize:"0.78rem", fontWeight:700, padding:"3px 10px", borderRadius:20, whiteSpace:"nowrap",
                          background: low ? "rgba(198,40,40,0.08)" : "rgba(42,138,62,0.09)",
                          color: low ? "#c62828" : "#2a8a3e",
                          border: "1px solid " + (low ? "rgba(198,40,40,0.25)" : "rgba(42,138,62,0.28)"),
                        }}>
                          {low ? ("⚠ $" + sub.toLocaleString() + " / 未達 $1,000") : ("✓ $" + sub.toLocaleString())}
                        </div>
                      )}
                    </div>
                    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                      {PRODUCTS.map(prod => {
                        const qty = form.positions[pos.key][prod.id] || 0;
                        const active = qty > 0;
                        return (
                          <div key={prod.id} className={"product-card" + (active ? " has-qty" : "")}>
                            <ProdImage src={prod.img} name={prod.name} />
                            <div style={{padding:"10px 10px 12px"}}>
                              <div className="prod-name" style={{fontSize:"0.75rem", fontWeight:600, lineHeight:1.35, color:"#0f1f12", minHeight:"2.2em"}}>{prod.name}</div>
                              {prod.note && <div style={{fontSize:"0.62rem", color:"#7ea882", marginTop:2}}>{prod.note}</div>}
                              <div className="prod-price" style={{fontFamily:"'Rajdhani',sans-serif", fontSize:"0.9rem", fontWeight:700, marginTop:4, color:"#2a8a3e"}}>
                                ${prod.price.toLocaleString()}
                              </div>
                              <div style={{display:"flex", alignItems:"center", gap:6, marginTop:8}}>
                                {active ? (
                                  <>
                                    <button className="qty-btn" onClick={e => { e.stopPropagation(); changeQty(pos.key, prod.id, -1); }} style={{background:"rgba(42,138,62,0.12)", color:"#2a8a3e"}}>−</button>
                                    <span style={{flex:1, textAlign:"center", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:"1rem", color:"#2a8a3e"}}>{qty}</span>

  /* ══════════════════════════════════════════
     MODE 2 — 訂單更新
  ══════════════════════════════════════════ */
  function OrderUpdate({onBack}) {
    const [step, setStep]           = useState(0);
    const [pasted, setPasted]       = useState("");
    const [refName, setRefName]     = useState("");
    const [refNo, setRefNo]         = useState("");
    const [placeName, setPlaceName] = useState("");
    const [placeNo, setPlaceNo]     = useState("");
    const [last5, setLast5]         = useState("");
    const [xferTime, setXferTime]   = useState("");
    const [cardAmt, setCardAmt]     = useState("");

    const isCard = pasted.includes("刷卡");
    const canFill = pasted.trim().length > 50;
    const canGen = refName && refNo && placeName && placeNo && (isCard ? cardAmt : (last5 && xferTime));

    const generate = () => {
      let t = pasted.trim();
      t = t.replace(/▶️推薦人\+編號：.*/, "▶️推薦人+編號：" + refName + " " + refNo);
      t = t.replace(/▶️安置人\+編號：.*/, "▶️安置人+編號：" + placeName + " " + placeNo);
      if (!isCard) {
        t = t.replace(/匯款帳號末五碼：.*/, "匯款帳號末五碼：" + last5);
        if (t.includes("匯款時間")) t = t.replace(/▶️匯款時間：.*/, "▶️匯款時間：" + xferTime);
        else t = t.replace(/匯款帳號末五碼：[^\n]*/, "匯款帳號末五碼：" + last5 + "\n▶️匯款時間：" + xferTime);
      } else {
        if (t.includes("刷卡金額")) t = t.replace(/▶️刷卡金額：.*/, "▶️刷卡金額：" + cardAmt);
        else t += "\n▶️刷卡金額：" + cardAmt;
      }
      return t;
    };

    const reset = () => { setStep(0); setPasted(""); setRefName(""); setRefNo(""); setPlaceName(""); setPlaceNo(""); setLast5(""); setXferTime(""); setCardAmt(""); };

    return (
      <div className="fade-in">
        <StepBar steps={["貼上訂單","補充資料","更新完成"]} current={step} />
        <Card>
          {step === 0 && (
            <div>
              <InfoBox color="green">請將「新訂單」產生的 LINE 文字完整貼入下方。</InfoBox>
              <label>貼上新訂單文字</label>
              <textarea rows={12} placeholder="將 LINE 訂單文字貼在這裡…" value={pasted} onChange={e => setPasted(e.target.value)} style={{fontSize:13, lineHeight:1.7}} />
              {pasted.length > 50 && <p style={{marginTop:10, fontSize:"0.78rem", color:"#1e7a35", fontWeight:600}}>✓ 已偵測到{isCard ? "刷卡" : "匯款"}訂單，請繼續。</p>}
            </div>
          )}
          {step === 1 && (
            <div style={{display:"flex", flexDirection:"column", gap:16}}>
              <InfoBox color="green">請填寫推薦人、安置人，以及付款確認細節。</InfoBox>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
                <div><label>推薦人姓名</label><input placeholder="例：王小明" value={refName} onChange={e => setRefName(e.target.value)} /></div>
                <div><label>推薦人編號</label><input placeholder="例：TW123456" value={refNo} onChange={e => setRefNo(e.target.value)} /></div>
                <div><label>安置人姓名</label><input placeholder="例：李大華" value={placeName} onChange={e => setPlaceName(e.target.value)} /></div>
                <div><label>安置人編號</label><input placeholder="例：TW123456" value={placeNo} onChange={e => setPlaceNo(e.target.value)} /></div>
              </div>
              <div style={{borderTop:"1px solid #d4e8d6", paddingTop:16}}>
                <p style={{fontFamily:"'Rajdhani',sans-serif", fontSize:"0.85rem", fontWeight:700, color:"#0f1f12", marginBottom:14, letterSpacing:"0.04em"}}>{isCard ? "刷卡確認資訊" : "匯款確認資訊"}</p>
                {!isCard ? (
                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
                    <div><label>匯款帳號末五碼</label><input placeholder="例：35682" value={last5} onChange={e => setLast5(e.target.value)} /></div>
                    <div><label>匯款時間</label><input placeholder="例：03/17 下午2:30" value={xferTime} onChange={e => setXferTime(e.target.value)} /></div>
                  </div>
                ) : (
                  <div><label>刷卡金額（含幣別）</label><input placeholder="例：USD 1,000 或 NTD 32,000" value={cardAmt} onChange={e => setCardAmt(e.target.value)} /></div>
                )}
              </div>
            </div>
          )}
          {step === 2 && (
            <div>
              <InfoBox color={isCard ? "blue" : "green"}>
                {isCard ? "訂單已更新！因含有刷卡資訊，請再使用「入單資訊更新」移除卡號後再公開分享。" : "訂單已更新！複製後傳給上線確認即可。"}
              </InfoBox>
              <div className="line-output">{generate()}</div>
              <CopyBtn getText={generate} />
              <ResetBtn onClick={reset} />
            </div>
          )}
        </Card>
        <div style={{maxWidth:520, margin:"16px auto 0", display:"flex", gap:10}}>
          <SecondaryBtn onClick={() => step === 0 ? onBack() : setStep(s => s - 1)}>{step === 0 ? "← 返回首頁" : "← 上一步"}</SecondaryBtn>
          {step < 2 && <PrimaryBtn onClick={() => setStep(s => s + 1)} disabled={step === 0 ? !canFill : !canGen}>{step === 1 ? "生成更新 →" : "填寫資料 →"}</PrimaryBtn>}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════
     MODE 3 — 入單資訊更新
  ══════════════════════════════════════════ */
  const CARD_PATTERNS = [/▶️刷卡/, /信用卡號：/, /信用卡英文名字：/, /信用卡有效期/, /安全碼/, /刷卡金額：/];
  const stripCard = text => text.split("\n").filter(l => !CARD_PATTERNS.some(p => p.test(l))).join("\n").replace(/\n{3,}/g, "\n\n").trim();

  function EntryUpdate({onBack}) {
    const [step, setStep]     = useState(0);
    const [pasted, setPasted] = useState("");
    const hasCard = pasted.includes("刷卡") || pasted.includes("信用卡號");
    const clean   = pasted ? stripCard(pasted) : "";
    const canGo   = pasted.trim().length > 50;

    return (
      <div className="fade-in">
        <StepBar steps={["貼上文字","確認移除","乾淨版本"]} current={step} />
        <Card>
          {step === 0 && (
            <div>
              <InfoBox color="green">將「訂單更新」產生的文字貼入。系統會自動移除刷卡敏感資訊，產生可公開分享的乾淨版本。</InfoBox>
              <label>貼上訂單更新文字</label>
              <textarea rows={12} placeholder="將含有刷卡資訊的訂單文字貼在這裡…" value={pasted} onChange={e => setPasted(e.target.value)} style={{fontSize:13, lineHeight:1.7}} />
              {pasted.length > 50 && <p style={{marginTop:10, fontSize:"0.78rem", fontWeight:600, color:hasCard?"#c62828":"#1e7a35"}}>{hasCard?"⚠ 偵測到刷卡資訊，下一步將自動移除。":"✓ 未偵測到刷卡資訊，仍可繼續生成乾淨版本。"}</p>}
            </div>
          )}
          {step === 1 && (
            <div>
              <InfoBox color="red">以下欄位將被移除：<br/><br/><strong>刷卡 / 信用卡號 / 信用卡英文名字 / 信用卡有效期 / 安全碼 / 刷卡金額</strong></InfoBox>
              <InfoBox color="green">保留內容：會員基本資料、產品選擇、匯款資訊、收貨資訊、EZway、推薦人與安置人等所有非敏感欄位。</InfoBox>
            </div>
          )}
          {step === 2 && (
            <div>
              <InfoBox color="green">刷卡資訊已移除！此版本可安全地在 LINE 群組流通。</InfoBox>
              <div className="line-output">{clean}</div>
              <CopyBtn getText={() => clean} />
              <ResetBtn onClick={() => { setStep(0); setPasted(""); }} />
            </div>
          )}
        </Card>
        <div style={{maxWidth:520, margin:"16px auto 0", display:"flex", gap:10}}>
          <SecondaryBtn onClick={() => step === 0 ? onBack() : setStep(s => s - 1)}>{step === 0 ? "← 返回首頁" : "← 上一步"}</SecondaryBtn>
          {step < 2 && <PrimaryBtn onClick={() => setStep(s => s + 1)} disabled={!canGo}>{step === 1 ? "確認移除，生成 →" : "預覽移除項目 →"}</PrimaryBtn>}
        </div>
      </div>
    );
  }

              <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
                <div>
                  <div style={{fontFamily:"'Rajdhani',sans-serif", fontSize:"1.05rem", fontWeight:700, color:"#0f1f12", letterSpacing:"0.04em"}}>{m.title}</div>
                  <div style={{fontSize:"0.76rem", color:"#7ea882", marginTop:3}}>{m.sub}</div>
                </div>
                <div style={{
                  fontFamily:"'Rajdhani',sans-serif",
                  fontSize:"0.65rem", fontWeight:700, padding:"3px 10px", borderRadius:20,
                  background:"rgba(42,138,62,0.09)", color:"#2a8a3e",
                  border:"1px solid rgba(42,138,62,0.22)",
                  whiteSpace:"nowrap", flexShrink:0, marginLeft:8, letterSpacing:"0.1em",
                }}>
                  {m.badge}
                </div>
              </div>
              <div style={{marginTop:14, paddingTop:12, borderTop:"1px solid #e8f5e9", fontSize:"0.73rem", color:"#7ea882", lineHeight:1.6}}>
                {m.desc}
              </div>
            </div>
          ))}
        </div>

        {/* ── Info ── */}
        <div style={{maxWidth:520, margin:"16px auto 0", padding:"12px 20px", background:"#ffffff", borderRadius:8, border:"1.5px solid #d4e8d6", fontSize:"0.73rem", color:"#7ea882", lineHeight:1.8, textAlign:"center"}}>
          三個步驟各自獨立運作，不需依序操作。每步完成後生成 LINE 格式文字供複製使用。
        </div>

        {/* ── Version ── */}
        <div style={{maxWidth:520, margin:"20px auto 0", fontSize:"0.63rem", color:"#b8d9bb", lineHeight:2, textAlign:"center"}}>
          <div style={{fontFamily:"'Rajdhani',sans-serif", fontWeight:700, marginBottom:4, letterSpacing:"0.12em", color:"#c8e6cb", textTransform:"uppercase"}}>Version History</div>
          <div><strong style={{color:"#b8d9bb"}}>v5.2</strong>　對齊官網綠色主題；Logo 綠底顯示；標題改為「奇跡入單」</div>
          <div><strong style={{color:"#c8e6cb"}}>v5.1</strong>　淺色底對齊官網；藍色系配色</div>
          <div><strong style={{color:"#c8e6cb"}}>v5.0</strong>　品牌重設計；CHAMPION'S CHOICE 主題</div>
          <div><strong style={{color:"#c8e6cb"}}>v4.2</strong>　補齊所有 8 款產品圖片</div>
          <div><strong style={{color:"#c8e6cb"}}>v3.0</strong>　產品改為數量加減，支援同品項多台</div>
          <div><strong style={{color:"#c8e6cb"}}>v2.0</strong>　三模式首頁架構</div>
          <div><strong style={{color:"#c8e6cb"}}>v1.0</strong>　初版上線</div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════
     ROOT APP
  ══════════════════════════════════════════ */
  function App() {
    const [mode, setMode] = useState("home");
    return (
      <div style={{padding:"32px 16px 80px"}}>
        {mode === "home"   && <Home        onSelect={setMode} />}
        {mode === "new"    && <NewOrder    onBack={() => setMode("home")} />}
        {mode === "update" && <OrderUpdate onBack={() => setMode("home")} />}
        {mode === "entry"  && <EntryUpdate onBack={() => setMode("home")} />}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
