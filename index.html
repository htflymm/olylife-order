<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OlyLife 訂單系統</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #080c14;
      --bg2:      #0c1220;
      --surface:  #111827;
      --surface2: #162032;
      --border:   #1e2d45;
      --border2:  #263650;
      --blue:     #00aaff;
      --blue-dim: #0066bb;
      --blue-bg:  rgba(0,170,255,0.07);
      --blue-glow:rgba(0,170,255,0.20);
      --blue2:    #38beff;
      --cyan:     #00e5ff;
      --text:     #e8f0f8;
      --text-dim: #7a9ab8;
      --text-mute:#334d66;
      --red:      #ff4d6a;
      --green:    #00d68f;
      --white:    #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif TC', serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── Terahertz wave background ── */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,120,255,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 110%, rgba(0,80,200,0.08) 0%, transparent 60%);
    }

    /* ── Subtle scan-line texture ── */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,170,255,0.015) 3px, rgba(0,170,255,0.015) 4px
      );
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse  { 0%,100% { opacity:.7; } 50% { opacity:1; } }
    @keyframes waveIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }

    .fade-in { animation: fadeIn 0.3s ease; position: relative; z-index: 1; }

    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 11px 14px;
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      font-family: 'Noto Serif TC', serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }
    input::placeholder, textarea::placeholder { color: var(--text-mute); }
    textarea { resize: none; }

    label {
      display: block;
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--blue2);
      margin-bottom: 6px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Product cards ── */
    .product-card {
      transition: all 0.15s ease;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface2);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover { border-color: var(--blue-dim); box-shadow: 0 0 12px rgba(0,120,255,0.15); }
    .product-card.has-qty {
      background: var(--blue-bg) !important;
      border-color: var(--blue) !important;
      box-shadow: 0 0 20px var(--blue-glow) !important;
    }
    .product-card.has-qty .prod-name  { color: var(--blue2) !important; }
    .product-card.has-qty .prod-price { color: var(--cyan)  !important; }

    .prod-img-wrap {
      width: 100%; aspect-ratio: 1/1;
      background: linear-gradient(135deg, #0c1626, #0f1e35);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; border-bottom: 1px solid var(--border);
    }
    .prod-img-wrap img { width: 100%; height: 100%; object-fit: contain; padding: 8px; }
    .prod-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem; font-weight: 700;
      color: var(--blue-dim); letter-spacing: 0.05em;
    }

    /* ── Qty buttons ── */
    .qty-btn {
      width: 28px; height: 28px; border-radius: 3px; border: none;
      font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.12s; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .qty-btn:active { transform: scale(0.88); }

    /* ── Section divider ── */
    .pos-section { border-left: 2px solid var(--blue-dim); padding-left: 16px; margin-bottom: 28px; }

    /* ── Buttons ── */
    .step-btn { transition: all 0.18s; font-family: 'Noto Serif TC', serif; }
    .step-btn:hover:not(:disabled) { transform: translateY(-1px); }

    /* ── LINE output ── */
    .line-output {
      font-family: monospace;
      background: #050810;
      color: #a8c8e8;
      border-radius: 4px;
      border: 1px solid var(--border);
      padding: 18px;
      white-space: pre-wrap;
      font-size: 12.5px;
      line-height: 1.8;
      max-height: 380px;
      overflow-y: auto;
    }

    /* ── Home cards ── */
    .home-card {
      cursor: pointer;
      border-radius: 6px;
      padding: 22px 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .home-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--blue), var(--cyan), transparent);
      opacity: 0; transition: opacity 0.2s;
      transform-origin: left;
    }
    .home-card:hover { border-color: var(--blue-dim); background: var(--surface2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,100,255,0.15); }
    .home-card:hover::before { opacity: 1; }

    /* ── Wave decoration ── */
    .thz-wave {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px; overflow: hidden;
    }
    .thz-wave::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent 0%, var(--blue) 30%, var(--cyan) 60%, transparent 100%);
      animation: waveIn 0.6s ease forwards;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState } = React;

  const LOGO = "https://olylife.com/Main/assets/company/logo.png";
  const BASE = "https://olylife.com/Main/assets/product/";
  const ADM  = "https://admin.olylifeint.com/Res/img/product/";
  const GLB  = "https://olylifeglobal.com/wp-content/uploads/";

  const PRODUCTS = [
    { id:"p90",      name:"P90",               price:1000, img: BASE+"OLY-HCA002.png" },
    { id:"p90plus",  name:"P90 Plus",           price:2000, img: ADM+"OLY-HCA002A.png" },
    { id:"shaken",   name:"甩脂儀 Shaken",      price:1000, img: GLB+"2025/11/olylife_shaken_massager.png" },
    { id:"g1",       name:"護眼儀 G1",           price:500,  img: BASE+"OLY-PKG004.png", note:"兩組，送葉黃素" },
    { id:"hydro",    name:"氫霸杯",              price:600,  img: ADM+"OLY-TPC002.png" },
    { id:"a9",       name:"A9 空氣淨化儀",       price:600,  img: ADM+"OLY-HCA005.png" },
    { id:"slyline",  name:"雲感衛生棉 SlyLine",  price:500,  img: GLB+"2025/09/olylife-skyline-sl-6.jpg" },
    { id:"miniblow", name:"小神吹",              price:600,  img: GLB+"2024/07/Vitality-Wand-copy-1-300x300.jpg" },
  ];

  const POSITIONS = [
    { key:"main",  label:"主球", icon:"▲", desc:"主要入單位置" },
    { key:"left",  label:"左球", icon:"◣", desc:"主球左側下線" },
    { key:"right", label:"右球", icon:"◢", desc:"主球右側下線" },
  ];
  const MIN = 1000;

  /* ── ProdImage ── */
  function ProdImage({src, name}) {
    const [failed, setFailed] = useState(false);
    if (!src || failed) {
      return (
        <div className="prod-img-wrap">
          <div className="prod-img-placeholder">{name.slice(0,2)}</div>
        </div>
      );
    }
    return (
      <div className="prod-img-wrap">
        <img src={src} alt={name} onError={() => setFailed(true)} />
      </div>
    );
  }

  /* ── Shared UI ── */
  const Card = ({children}) => (
    <div style={{maxWidth:520, margin:"0 auto", background:"#111827", borderRadius:6, boxShadow:"0 8px 40px rgba(0,0,0,0.6)", padding:"28px 24px", border:"1px solid #1e2d45", position:"relative", zIndex:1}}>
      {children}
    </div>
  );

  const PrimaryBtn = ({onClick, disabled, children, green}) => (
    <button onClick={onClick} disabled={disabled} className="step-btn" style={{
      flex:2, padding:"14px", borderRadius:4, border:"none",
      background: disabled ? "#162032"
        : green ? "linear-gradient(135deg,#006644,#00d68f)"
        : "linear-gradient(135deg,#0055bb,#00aaff)",
      color: disabled ? "#334d66" : "#fff",
      fontWeight:700, fontSize:"0.9rem",
      cursor: disabled ? "not-allowed" : "pointer",
      boxShadow: disabled ? "none" : (green ? "0 4px 18px rgba(0,214,143,0.3)" : "0 4px 18px rgba(0,140,255,0.35)"),
      fontFamily:"'Noto Serif TC',serif", transition:"all 0.2s", letterSpacing:"0.03em",
    }}>{children}</button>
  );

  const SecondaryBtn = ({onClick, children}) => (
    <button onClick={onClick} className="step-btn" style={{
      flex:1, padding:"14px", borderRadius:4,
      border:"1px solid #1e2d45", background:"#111827",
      color:"#7a9ab8", fontWeight:600, fontSize:"0.88rem", cursor:"pointer",
      fontFamily:"'Noto Serif TC',serif",
    }}>{children}</button>
  );

  const CopyBtn = ({getText}) => {
    const [copied, setCopied] = useState(false);
    return (
      <button onClick={() => { navigator.clipboard.writeText(getText()).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2500); }); }} style={{
        width:"100%", marginTop:16, padding:"14px", borderRadius:4, border:"none",
        background: copied ? "linear-gradient(135deg,#006644,#00d68f)" : "linear-gradient(135deg,#0055bb,#00aaff)",
        color:"#fff", fontWeight:700, fontSize:"0.95rem", cursor:"pointer",
        boxShadow: copied ? "0 4px 18px rgba(0,214,143,0.3)" : "0 4px 18px rgba(0,140,255,0.35)",
        transition:"all 0.3s", fontFamily:"'Noto Serif TC',serif", letterSpacing:"0.03em",
      }}>
        {copied ? "已複製！貼到 LINE 吧" : "一鍵複製 LINE 格式"}
      </button>
    );
  };

  const ResetBtn = ({onClick}) => (
    <button onClick={onClick} style={{
      width:"100%", marginTop:10, padding:"12px", borderRadius:4,
      border:"1px solid #1e2d45", background:"transparent",
      color:"#7a9ab8", fontWeight:600, fontSize:"0.88rem", cursor:"pointer",
      fontFamily:"'Noto Serif TC',serif",
    }}>↺ 重新操作</button>
  );

  const StepBar = ({steps, current}) => (
    <div style={{maxWidth:520, margin:"0 auto 24px", position:"relative", zIndex:1}}>
      <div style={{display:"flex", alignItems:"center", marginBottom:8}}>
        {steps.map((s, i) => (
          <React.Fragment key={i}>
            <div style={{
              width:30, height:30, borderRadius:3, flexShrink:0,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontFamily:"'Rajdhani',sans-serif", fontSize:"0.72rem", fontWeight:700,
              background: i < current ? "#0055bb" : (i === current ? "#00aaff" : "#162032"),
              color: i < current ? "#fff" : (i === current ? "#fff" : "#334d66"),
              border: "1px solid " + (i < current ? "#0055bb" : (i === current ? "#00aaff" : "#1e2d45")),
              boxShadow: i === current ? "0 0 14px rgba(0,170,255,0.5)" : "none",
              transition:"all 0.3s",
            }}>{i < current ? "✓" : i + 1}</div>
            {i < steps.length - 1 && (
              <div style={{flex:1, height:1, margin:"0 4px", background: i < current ? "#0055bb" : "#1e2d45", transition:"background 0.3s"}} />
            )}
          </React.Fragment>
        ))}
      </div>
      <div style={{textAlign:"center"}}>
        <span style={{fontFamily:"'Rajdhani',sans-serif", color:"#00aaff", fontWeight:700, fontSize:"0.85rem", letterSpacing:"0.12em", textTransform:"uppercase"}}>{steps[current]}</span>
      </div>
    </div>
  );

  const InfoBox = ({color, children}) => {
    const C = {
      blue:  {bg:"rgba(0,170,255,0.07)", border:"rgba(0,170,255,0.3)", text:"#38beff"},
      red:   {bg:"rgba(255,77,106,0.07)", border:"rgba(255,77,106,0.3)", text:"#ff4d6a"},
      green: {bg:"rgba(0,214,143,0.07)", border:"rgba(0,214,143,0.3)", text:"#00d68f"},
    };
    const c = C[color] || C.blue;
    return (
      <div style={{padding:"12px 16px", borderRadius:4, marginBottom:16, background:c.bg, border:"1px solid "+c.border, fontSize:"0.82rem", color:c.text, lineHeight:1.7}}>
        {children}
      </div>
    );
  };

  /* ══════════════════════════════════════════
     MODE 1 — 新訂單
  ══════════════════════════════════════════ */
  const emptyNew = {
    positions: {main:{}, left:{}, right:{}},
    name:"", idNumber:"", email:"", phone:"", postalCode:"", address:"",
    payMethod:"transfer", cardNumber:"", cardName:"", cardExpiry:"", cardCVV:"",
    sameAsPersonal:true, shipName:"", shipId:"", shipPhone:"", shipAddress:"",
    ezway:"", remarks:"",
  };

  function NewOrder({onBack}) {
    const [step, setStep] = useState(0);
    const [form, setForm] = useState(emptyNew);
    const [transferTo, setTransferTo] = useState("");

    const set = (k, v) => setForm(f => ({...f, [k]: v}));

    const changeQty = (pos, id, delta) => setForm(f => {
      const cur = f.positions[pos][id] || 0;
      const next = Math.max(0, cur + delta);
      const updated = {...f.positions[pos]};
      if (next === 0) delete updated[id]; else updated[id] = next;
      return {...f, positions: {...f.positions, [pos]: updated}};
    });

    const posTotal = (pk) => Object.entries(form.positions[pk]).reduce((s, [id, qty]) => {
      const p = PRODUCTS.find(pr => pr.id === id);
      return s + (p ? p.price * qty : 0);
    }, 0);

    const total = POSITIONS.reduce((s, p) => s + posTotal(p.key), 0);

    const posOk = () =>
      Object.keys(form.positions.main).length > 0 &&
      POSITIONS.every(p => Object.keys(form.positions[p.key]).length === 0 || posTotal(p.key) >= MIN);

    const generateLine = () => {
      const posLine = POSITIONS.map(p => {
        const entries = Object.entries(form.positions[p.key]);
        if (!entries.length) return p.label + "：（未選擇）";
        const items = entries.map(([id, qty]) => {
          const pr = PRODUCTS.find(r => r.id === id);
          return qty > 1 ? (pr.name + " x" + qty + "（$" + (pr.price * qty) + "）") : (pr.name + "（$" + pr.price + "）");
        }).join("、");
        return p.label + "：" + items + "\n　　　　小計 $" + posTotal(p.key).toLocaleString();
      }).join("\n");

      let paySection;
      if (form.payMethod === "transfer") {
        paySection = "▶️匯款信息\n中國信託(822) 台中南屯分行 \n匯款帳號：045540435682 \n戶名：鄒震宇\n（備註欄空白，方便對帳）\n----------------------";
        if (transferTo) paySection += "\n匯款給：" + transferTo;
      } else {
        paySection = "▶️刷卡 \n(一台刷美金1000\n匯率和手續費視銀行而定\n若少刷外幣，請先照會銀行\n以免被拒！)\n\n信用卡號：" + form.cardNumber + "\n\n信用卡英文名字：" + form.cardName + "\n\n信用卡有效期（mm/yy）：" + form.cardExpiry + "\n\n安全碼(卡背面的三位數字)：" + form.cardCVV;
      }

      const sn = form.sameAsPersonal ? form.name    : form.shipName;
      const si = form.sameAsPersonal ? form.idNumber : form.shipId;
      const sp = form.sameAsPersonal ? form.phone    : form.shipPhone;
      const sa = form.sameAsPersonal ? form.address  : form.shipAddress;

      let out = "會員註冊資料(版本更新)\n🌟Olylife 註冊資料\n\n";
      out += "▶️中文姓名：" + form.name + "\n";
      out += "▶️身分證字號：" + form.idNumber + "\n";
      out += "▶️電子郵箱：" + form.email + "\n";
      out += "▶️手機號碼：" + form.phone + "\n";
      out += "▶️郵遞區號：" + form.postalCode + "\n";
      out += "▶️地址：" + form.address + "\n\n";
      out += "▶️產品選擇（合計 $" + total.toLocaleString() + "）\n" + posLine + "\n\n";
      out += paySection + "\n\n";
      out += "▶️收貨信息\n 姓名：" + sn + "\n 身分證號：" + si + "\n 電話：" + sp + "\n 地址：" + sa + "\n\n";
      out += "▶️有無申請EZway：" + (form.ezway || "未填") + "\n(申請EZway資料，務必和上面\n收貨信息相同！）\n";
      if (form.remarks) out += "\n▶️備註：" + form.remarks + "\n";
      if (form.payMethod === "transfer") out += "\n▶️備註：\n匯款帳號末五碼：\n";
      out += "\n以下客戶免填\n▶️推薦人+編號：\n▶️安置人+編號：";
      return out;
    };

    const canNext = () => {
      if (step === 0) return posOk();
      if (step === 1) return form.name && form.idNumber && form.email && form.phone && form.address;
      if (step === 2) return form.payMethod === "transfer" || (form.cardNumber && form.cardName && form.cardExpiry && form.cardCVV);
      if (step === 3) return form.sameAsPersonal || (form.shipName && form.shipId && form.shipPhone && form.shipAddress);
      return true;
    };

    const tagStyle = (active) => ({
      flex:1, padding:"13px", borderRadius:4, fontWeight:600, fontSize:"0.88rem",
      border: "1px solid " + (active ? "#00aaff" : "#1e2d45"),
      background: active ? "rgba(0,170,255,0.1)" : "transparent",
      color: active ? "#38beff" : "#7a9ab8",
      cursor:"pointer", transition:"all 0.2s", fontFamily:"'Noto Serif TC',serif",
      boxShadow: active ? "0 0 10px rgba(0,170,255,0.15)" : "none",
    });

    return (
      <div className="fade-in">
        <StepBar steps={["產品選擇","個人資料","付款方式","收貨資訊","確認訂單"]} current={step} />
        <Card>

          {/* Step 0 — Products */}
          {step === 0 && (
            <div>
              <p style={{color:"#7a9ab8", fontSize:"0.82rem", marginBottom:20, lineHeight:1.7}}>
                每個位置可選多項產品，金額自動加總。主球必填，左右球可視情況選填。
                <strong style={{color:"#00aaff"}}> 每個球位最低 $1,000。</strong>
              </p>
              {POSITIONS.map(pos => {
                const sub = posTotal(pos.key);
                const hasSel = Object.keys(form.positions[pos.key]).length > 0;
                const low = hasSel && sub < MIN;
                return (
                  <div key={pos.key} className="pos-section" style={{borderLeftColor: low ? "#ff4d6a" : "#0066bb"}}>
                    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>
                      <div>
                        <span style={{fontFamily:"'Rajdhani',sans-serif", fontSize:"0.95rem", fontWeight:700, color:"#e8f0f8", letterSpacing:"0.05em"}}>{pos.icon} {pos.label}</span>
                        <span style={{fontSize:"0.72rem", color:"#7a9ab8", marginLeft:8}}>{pos.desc}</span>
                      </div>
                      {hasSel && (
                        <div style={{
                          fontFamily:"'Rajdhani',sans-serif",
                          fontSize:"0.78rem", fontWeight:700, padding:"3px 10px", borderRadius:3, whiteSpace:"nowrap",
                          background: low ? "rgba(255,77,106,0.1)" : "rgba(0,170,255,0.1)",
                          color: low ? "#ff4d6a" : "#38beff",
                          border: "1px solid " + (low ? "rgba(255,77,106,0.3)" : "rgba(0,170,255,0.3)"),
                        }}>
                          {low ? ("⚠ $" + sub.toLocaleString() + " / 未達 $1,000") : ("✓ $" + sub.toLocaleString())}
                        </div>
                      )}
                    </div>
                    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                      {PRODUCTS.map(prod => {
                        const qty = form.positions[pos.key][prod.id] || 0;
                        const active = qty > 0;
                        return (
                          <div key={prod.id} className={"product-card" + (active ? " has-qty" : "")}>
                            <ProdImage src={prod.img} name={prod.name} />
                            <div style={{padding:"10px 10px 12px"}}>
                              <div className="prod-name" style={{fontSize:"0.75rem", fontWeight:600, lineHeight:1.35, color:"#c8dcea", minHeight:"2.2em"}}>{prod.name}</div>

  /* ══════════════════════════════════════════
     MODE 2 — 訂單更新

  function OrderUpdate({onBack}) {
    const [step, setStep]           = useState(0);
    const [pasted, setPasted]       = useState("");
    const [refName, setRefName]     = useState("");
    const [refNo, setRefNo]         = useState("");
    const [placeName, setPlaceName] = useState("");
    const [placeNo, setPlaceNo]     = useState("");
    const [last5, setLast5]         = useState("");
    const [xferTime, setXferTime]   = useState("");
    const [cardAmt, setCardAmt]     = useState("");

    const isCard = pasted.includes("刷卡");
    const canFill = pasted.trim().length > 50;
    const canGen = refName && refNo && placeName && placeNo && (isCard ? cardAmt : (last5 && xferTime));

    const generate = () => {
      let t = pasted.trim();
      t = t.replace(/▶️推薦人\+編號：.*/, "▶️推薦人+編號：" + refName + " " + refNo);
      t = t.replace(/▶️安置人\+編號：.*/, "▶️安置人+編號：" + placeName + " " + placeNo);
      if (!isCard) {
        t = t.replace(/匯款帳號末五碼：.*/, "匯款帳號末五碼：" + last5);
        if (t.includes("匯款時間")) t = t.replace(/▶️匯款時間：.*/, "▶️匯款時間：" + xferTime);
        else t = t.replace(/匯款帳號末五碼：[^\n]*/, "匯款帳號末五碼：" + last5 + "\n▶️匯款時間：" + xferTime);
      } else {
        if (t.includes("刷卡金額")) t = t.replace(/▶️刷卡金額：.*/, "▶️刷卡金額：" + cardAmt);
        else t += "\n▶️刷卡金額：" + cardAmt;
      }
      return t;
    };

    const reset = () => { setStep(0); setPasted(""); setRefName(""); setRefNo(""); setPlaceName(""); setPlaceNo(""); setLast5(""); setXferTime(""); setCardAmt(""); };

    return (
      <div className="fade-in">
        <StepBar steps={["貼上訂單","補充資料","更新完成"]} current={step} />
        <Card>
          {step === 0 && (
            <div>
              <InfoBox color="blue">請將「新訂單」產生的 LINE 文字完整貼入下方。</InfoBox>
              <label>貼上新訂單文字</label>
              <textarea rows={12} placeholder="將 LINE 訂單文字貼在這裡…" value={pasted} onChange={e => setPasted(e.target.value)} style={{fontSize:13, lineHeight:1.7}} />
              {pasted.length > 50 && <p style={{marginTop:10, fontSize:"0.78rem", color:"#00d68f", fontWeight:600}}>✓ 已偵測到{isCard ? "刷卡" : "匯款"}訂單，請繼續。</p>}
            </div>
          )}
          {step === 1 && (
            <div style={{display:"flex", flexDirection:"column", gap:16}}>
              <InfoBox color="blue">請填寫推薦人、安置人，以及付款確認細節。</InfoBox>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
                <div><label>推薦人姓名</label><input placeholder="例：王小明" value={refName} onChange={e => setRefName(e.target.value)} /></div>
                <div><label>推薦人編號</label><input placeholder="例：TW123456" value={refNo} onChange={e => setRefNo(e.target.value)} /></div>
                <div><label>安置人姓名</label><input placeholder="例：李大華" value={placeName} onChange={e => setPlaceName(e.target.value)} /></div>
                <div><label>安置人編號</label><input placeholder="例：TW123456" value={placeNo} onChange={e => setPlaceNo(e.target.value)} /></div>
              </div>
              <div style={{borderTop:"1px solid #1e2d45", paddingTop:16}}>
                <p style={{fontFamily:"'Rajdhani',sans-serif", fontSize:"0.85rem", fontWeight:700, color:"#e8f0f8", marginBottom:14, letterSpacing:"0.05em"}}>{isCard ? "刷卡確認資訊" : "匯款確認資訊"}</p>
                {!isCard ? (
                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:12}}>
                    <div><label>匯款帳號末五碼</label><input placeholder="例：35682" value={last5} onChange={e => setLast5(e.target.value)} /></div>
                    <div><label>匯款時間</label><input placeholder="例：03/17 下午2:30" value={xferTime} onChange={e => setXferTime(e.target.value)} /></div>
                  </div>
                ) : (
                  <div><label>刷卡金額（含幣別）</label><input placeholder="例：USD 1,000 或 NTD 32,000" value={cardAmt} onChange={e => setCardAmt(e.target.value)} /></div>
                )}
              </div>
            </div>
          )}
          {step === 2 && (
            <div>
              <InfoBox color={isCard ? "blue" : "green"}>
                {isCard ? "訂單已更新！因含有刷卡資訊，請再使用「入單資訊更新」移除卡號後再公開分享。" : "訂單已更新！複製後傳給上線確認即可。"}
              </InfoBox>
              <div className="line-output">{generate()}</div>
              <CopyBtn getText={generate} />
              <ResetBtn onClick={reset} />
            </div>
          )}
        </Card>
        <div style={{maxWidth:520, margin:"16px auto 0", display:"flex", gap:10, position:"relative", zIndex:1}}>
          <SecondaryBtn onClick={() => step === 0 ? onBack() : setStep(s => s - 1)}>{step === 0 ? "← 返回首頁" : "← 上一步"}</SecondaryBtn>
          {step < 2 && <PrimaryBtn onClick={() => setStep(s => s + 1)} disabled={step === 0 ? !canFill : !canGen}>{step === 1 ? "生成更新 →" : "填寫資料 →"}</PrimaryBtn>}
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════
     MODE 3 — 入單資訊更新
  ══════════════════════════════════════════ */
  const CARD_PATTERNS = [/▶️刷卡/, /信用卡號：/, /信用卡英文名字：/, /信用卡有效期/, /安全碼/, /刷卡金額：/];
  const stripCard = text => text.split("\n").filter(l => !CARD_PATTERNS.some(p => p.test(l))).join("\n").replace(/\n{3,}/g, "\n\n").trim();

  function EntryUpdate({onBack}) {
    const [step, setStep]     = useState(0);
    const [pasted, setPasted] = useState("");
    const hasCard = pasted.includes("刷卡") || pasted.includes("信用卡號");
    const clean   = pasted ? stripCard(pasted) : "";
    const canGo   = pasted.trim().length > 50;

    return (
      <div className="fade-in">
        <StepBar steps={["貼上文字","確認移除","乾淨版本"]} current={step} />
        <Card>
          {step === 0 && (
            <div>
              <InfoBox color="blue">將「訂單更新」產生的文字貼入。系統會自動移除刷卡敏感資訊，產生可公開分享的乾淨版本。</InfoBox>
              <label>貼上訂單更新文字</label>
              <textarea rows={12} placeholder="將含有刷卡資訊的訂單文字貼在這裡…" value={pasted} onChange={e => setPasted(e.target.value)} style={{fontSize:13, lineHeight:1.7}} />
              {pasted.length > 50 && <p style={{marginTop:10, fontSize:"0.78rem", fontWeight:600, color:hasCard?"#ff4d6a":"#00d68f"}}>{hasCard?"⚠ 偵測到刷卡資訊，下一步將自動移除。":"✓ 未偵測到刷卡資訊，仍可繼續生成乾淨版本。"}</p>}
            </div>
          )}
          {step === 1 && (
            <div>
              <InfoBox color="red">以下欄位將被移除：<br/><br/><strong>刷卡 / 信用卡號 / 信用卡英文名字 / 信用卡有效期 / 安全碼 / 刷卡金額</strong></InfoBox>
              <InfoBox color="green">保留內容：會員基本資料、產品選擇、匯款資訊、收貨資訊、EZway、推薦人與安置人等所有非敏感欄位。</InfoBox>
            </div>
          )}
          {step === 2 && (
            <div>
              <InfoBox color="green">刷卡資訊已移除！此版本可安全地在 LINE 群組流通。</InfoBox>
              <div className="line-output">{clean}</div>
              <CopyBtn getText={() => clean} />
              <ResetBtn onClick={() => { setStep(0); setPasted(""); }} />
            </div>
          )}
        </Card>
        <div style={{maxWidth:520, margin:"16px auto 0", display:"flex", gap:10, position:"relative", zIndex:1}}>
          <SecondaryBtn onClick={() => step === 0 ? onBack() : setStep(s => s - 1)}>{step === 0 ? "← 返回首頁" : "← 上一步"}</SecondaryBtn>
          {step < 2 && <PrimaryBtn onClick={() => setStep(s => s + 1)} disabled={!canGo}>{step === 1 ? "確認移除，生成 →" : "預覽移除項目 →"}</PrimaryBtn>}
        </div>
      </div>
    );
  }

          <div style={{fontSize:"0.8rem", color:"#7a9ab8", letterSpacing:"0.1em"}}>訂單管理系統</div>

          {/* Terahertz wave divider */}
          <div style={{marginTop:20, height:1, background:"linear-gradient(90deg, transparent, #0066bb, #00aaff, #00e5ff, #0066bb, transparent)"}} />
        </div>

        {/* Mode cards */}
        <div style={{maxWidth:520, margin:"0 auto", display:"flex", flexDirection:"column", gap:12, position:"relative", zIndex:1}}>
          {MODES.map((m, i) => (
            <div key={m.id} onClick={() => onSelect(m.id)} className="home-card" style={{animation:"fadeIn 0.4s ease "+(i*0.08)+"s both"}}>
              {/* Accent top line on hover - handled by CSS */}
              <div className="thz-wave" />
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start"}}>
                <div>
                  <div style={{fontFamily:"'Rajdhani',sans-serif", fontSize:"1.05rem", fontWeight:700, color:"#e8f0f8", letterSpacing:"0.05em"}}>{m.title}</div>
                  <div style={{fontSize:"0.76rem", color:"#7a9ab8", marginTop:3}}>{m.sub}</div>
                </div>
                <div style={{
                  fontFamily:"'Rajdhani',sans-serif",
                  fontSize:"0.65rem", fontWeight:700, padding:"3px 9px", borderRadius:3,
                  background: "rgba(0,170,255,0.1)",
                  color: m.accent,
                  border: "1px solid rgba(0,170,255,0.25)",
                  whiteSpace:"nowrap", flexShrink:0, marginLeft:8, letterSpacing:"0.1em",
                }}>
                  {m.badge}
                </div>
              </div>
              <div style={{marginTop:14, paddingTop:12, borderTop:"1px solid #1e2d45", fontSize:"0.73rem", color:"#334d66", lineHeight:1.6}}>
                {m.desc}
              </div>
            </div>
          ))}
        </div>

        {/* Info */}
        <div style={{maxWidth:520, margin:"20px auto 0", padding:"12px 20px", background:"rgba(0,170,255,0.04)", borderRadius:4, border:"1px solid #1e2d45", fontSize:"0.73rem", color:"#334d66", lineHeight:1.8, textAlign:"center", position:"relative", zIndex:1}}>
          三個步驟各自獨立運作，不需依序操作。每步完成後生成 LINE 格式文字供複製使用。
        </div>

        {/* Version history */}
        <div style={{maxWidth:520, margin:"20px auto 0", fontSize:"0.63rem", color:"#1e2d45", lineHeight:2, textAlign:"center", position:"relative", zIndex:1}}>
          <div style={{fontFamily:"'Rajdhani',sans-serif", fontWeight:700, marginBottom:4, letterSpacing:"0.12em", color:"#263650", textTransform:"uppercase"}}>Version History</div>
          <div><strong style={{color:"#263650"}}>v5.0</strong>　全面對齊 OlyLife 官方品牌風格：太赫茲藍色主題</div>
          <div><strong style={{color:"#1e2d45"}}>v4.2</strong>　補齊所有 8 款產品圖片</div>
          <div><strong style={{color:"#1e2d45"}}>v4.1</strong>　新增官網商品圖片；移除 emoji 開頭</div>
          <div><strong style={{color:"#1e2d45"}}>v4.0</strong>　深色科技感主題</div>
          <div><strong style={{color:"#1e2d45"}}>v3.0</strong>　產品改為數量加減，支援同品項多台</div>
          <div><strong style={{color:"#1e2d45"}}>v2.0</strong>　三模式首頁架構</div>
          <div><strong style={{color:"#1e2d45"}}>v1.0</strong>　初版上線</div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════════
     ROOT APP
  ══════════════════════════════════════════ */
  function App() {
    const [mode, setMode] = useState("home");
    return (
      <div style={{padding:"32px 16px 80px"}}>
        {mode === "home"   && <Home        onSelect={setMode} />}
        {mode === "new"    && <NewOrder    onBack={() => setMode("home")} />}
        {mode === "update" && <OrderUpdate onBack={() => setMode("home")} />}
        {mode === "entry"  && <EntryUpdate onBack={() => setMode("home")} />}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
